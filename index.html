<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Malolan • markdown viewer</title>
  <!-- Fonts & icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #c7d2fe transparent; }
    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; border-radius: 8px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 8px; }
    .mark-search {
      background: #fde047;
      color: #1e293b;
      border-radius: 4px;
      padding: 0 2px;
      font-weight: 600;
      box-shadow: 0 0 0 2px rgba(253, 224, 71, 0.4);
    }
    .row-striped tbody tr:nth-child(even) { background-color: #f8fafc; }
    .glass-panel { backdrop-filter: blur(10px); background: rgba(255,255,255,0.8); }
    /* markdown content styling */
    .md-content {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #1e293b;
    }
    .md-content h1, .md-content h2, .md-content h3 {
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .md-content h1 { font-size: 1.8rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.3rem; }
    .md-content h2 { font-size: 1.5rem; }
    .md-content h3 { font-size: 1.25rem; }
    .md-content p { margin: 0.75rem 0; }
    .md-content ul, .md-content ol { margin: 0.75rem 0; padding-left: 1.5rem; }
    .md-content li { margin: 0.25rem 0; }
    .md-content code { background: #f1f5f9; padding: 0.15rem 0.4rem; border-radius: 6px; font-size: 0.875rem; }
    .md-content pre { background: #f1f5f9; padding: 1rem; border-radius: 12px; overflow-x: auto; }
    .md-content blockquote { border-left: 4px solid #a5b4fc; padding-left: 1rem; color: #475569; }
    .md-content table { 
      border-collapse: collapse; 
      width: 100%; 
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    .md-content th {
      background: #f1f5f9;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: 1px solid #e2e8f0;
      text-align: left;
    }
    .md-content td {
      padding: 0.5rem 1rem;
      border: 1px solid #e2e8f0;
    }
    .md-content tr:nth-child(even) { background: #fafcff; }
    .md-content img { max-width: 100%; border-radius: 8px; }
    .prose a { color: #4f46e5; text-decoration: underline; }
    .prose a:hover { color: #4338ca; }
    .line-highlight { background: #fef9c3; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50 text-slate-700 font-sans min-h-screen pb-16" style="font-family: 'Inter', system-ui, sans-serif;">

  <!-- Premium navigation -->
  <nav class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200/60 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-2 text-2xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent hover:scale-105 transition-transform">
        <span class="text-3xl">📜</span> Malolan
      </a>
      <div id="nav-file-name" class="hidden text-sm font-medium text-slate-500 bg-slate-100 px-4 py-1.5 rounded-full"></div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-10">
    <!-- Homepage: list .md files -->
    <div id="homepage-view" class="hidden">
      <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 tracking-tight">Explore <span class="bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">Markdown files</span></h1>
        <p class="mt-4 text-lg text-slate-500 max-w-2xl mx-auto">Select a .md file to view its full content with search & highlight.</p>
      </div>
      <ul id="file-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- dynamic file cards -->
      </ul>
    </div>

    <!-- File view (full markdown) -->
    <div id="file-view" class="hidden">
      <!-- Toolbar -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
        <a href="index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-indigo-600 hover:text-indigo-800 bg-white px-4 py-2 rounded-full shadow-sm border border-indigo-100 hover:shadow-md transition">
          <span>←</span> Datasets
        </a>

        <div class="relative flex-1 min-w-[280px] max-w-lg">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" />
            </svg>
          </div>
          <input id="search-input" type="text" autocomplete="off" placeholder="Search within file… (press / to focus)"
            class="w-full pl-11 pr-28 py-3 text-sm bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition-all" />
          <div id="search-controls" class="hidden absolute inset-y-1 right-1 flex items-center gap-1 bg-white/90 rounded-xl px-1">
            <span id="search-count" class="text-xs font-mono text-slate-500 px-2 select-none whitespace-nowrap"></span>
            <button id="search-prev" type="button" title="Previous (Shift+Enter)" class="p-1.5 rounded-lg hover:bg-indigo-50 text-slate-500 hover:text-indigo-700 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M14.77 12.79a.75.75 0 01-1.06-.02L10 8.832l-3.71 3.938a.75.75 0 11-1.08-1.04l4.25-4.5a.75.75 0 011.08 0l4.25 4.5a.75.75 0 01-.02 1.06z" clip-rule="evenodd" /></svg>
            </button>
            <button id="search-next" type="button" title="Next (Enter)" class="p-1.5 rounded-lg hover:bg-indigo-50 text-slate-500 hover:text-indigo-700 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" /></svg>
            </button>
            <button id="search-clear" type="button" title="Clear (Esc)" class="p-1.5 rounded-lg hover:bg-red-50 text-slate-500 hover:text-red-600 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" clip-rule="evenodd" /></svg>
            </button>
          </div>
        </div>

        <!-- simple info -->
        <div class="flex items-center gap-3 text-sm text-slate-500 bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200">
          <span id="word-count-badge">📄</span>
        </div>
      </div>

      <!-- Markdown content card -->
      <div class="bg-white/80 backdrop-blur-sm shadow-xl rounded-2xl overflow-hidden border border-slate-200/80">
        <div id="md-scroll-container" class="overflow-auto custom-scroll p-6 md:p-10" style="max-height: 75vh;">
          <div id="md-content" class="md-content prose max-w-none">
            <!-- dynamically rendered markdown content -->
          </div>
        </div>
      </div>
      <div class="mt-3 text-xs text-right text-slate-400 pr-2" id="file-info-indicator"></div>
    </div>

    <!-- Status message -->
    <div id="status-message" class="text-center py-20 hidden">
      <div class="inline-flex flex-col items-center gap-4 bg-white p-8 rounded-3xl shadow-lg">
        <div class="animate-spin h-8 w-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full"></div>
        <p class="text-lg font-medium text-slate-600" id="status-text">Loading markdown file...</p>
      </div>
    </div>
  </main>

  <script>
    (function() {
      // ----- CONFIGURATION -----
      const mdFiles = [
        "brahma-sutra-adhyaya-one.md",
        "brahma-sutra-adhyaya-two.md",
        "brahma-sutra-adhyaya-three.md",
        "brahma-sutra-adhyaya-four.md",
        "gitarthasangraha.md",
        "brihadaranyaka-upanishad.md",
        "chandogya-upanishad.md",
        "katha-upanishad.md",
        "kaushitaki-upanishad.md",
        "shvetasvatara-upanishad.md",
        "taittiriya-upanishad.md",
        "upanishad-one.md",
        "mimamsa-paribasha.md",
        "mundaka-upanishad.md",
        "natvacandrika-pramukhacapetika.md",
        "purushakara-mimamsa.md",
        "rahasyatrayasara.md",
        "rahasyatrayasararthasangraha.md",
        "sahatadushani.md",
        "smritimuktaphalam.md",
        "stotraratna.md",
        "tarkasangraha.md",
        "tattvamuktakalapam.md",
        "vedarthasangraha.md",
      ];
      const dataFolder = "data/";

      // DOM elements
      const homepageView = document.getElementById('homepage-view');
      const fileView = document.getElementById('file-view');
      const fileList = document.getElementById('file-list');
      const mdContent = document.getElementById('md-content');
      const statusMessage = document.getElementById('status-message');
      const statusText = document.getElementById('status-text');
      const navFileName = document.getElementById('nav-file-name');
      const searchInput = document.getElementById('search-input');
      const searchControls = document.getElementById('search-controls');
      const searchCount = document.getElementById('search-count');
      const searchPrevBtn = document.getElementById('search-prev');
      const searchNextBtn = document.getElementById('search-next');
      const searchClearBtn = document.getElementById('search-clear');
      const fileInfoIndicator = document.getElementById('file-info-indicator');
      const wordCountBadge = document.getElementById('word-count-badge');

      // State
      let fullMarkdownText = '';
      let searchMatches = [];
      let searchPointer = -1;
      let currentSearchQuery = '';
      let searchDebounceTimer = null;
      let currentFileName = '';

      const escapeHtml = (str) => {
        if (!str) return '';
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      };

      // simple markdown to HTML (basic support)
      function markdownToHtml(md) {
        if (!md) return '';
        let html = md;
        // code blocks
        html = html.replace(/```([\s\S]*?)```/g, (m, code) => `<pre><code>${escapeHtml(code)}</code></pre>`);
        // inline code
        html = html.replace(/`([^`]+)`/g, (m, code) => `<code>${escapeHtml(code)}</code>`);
        // headers
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        // bold & italic
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        // links
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        // images
        html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" />');
        // blockquotes
        html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
        // unordered lists
        html = html.replace(/^\- (.*$)/gm, '<li>$1</li>');
        html = html.replace(/^\* (.*$)/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        // ordered lists (simplified)
        html = html.replace(/^\d+\. (.*$)/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ol>$1</ol>');
        // paragraphs: double newline to <p>
        html = html.replace(/\n\n/g, '</p><p>');
        html = '<p>' + html + '</p>';
        // clean up empty paragraphs
        html = html.replace(/<p>\s*<\/p>/g, '');
        // line breaks
        html = html.replace(/\n/g, '<br />');
        return html;
      }

      function showStatus(msg, isError = false) {
        statusMessage.classList.remove('hidden');
        statusText.textContent = msg;
        statusText.className = isError ? "text-lg font-medium text-rose-600" : "text-lg font-medium text-slate-600";
      }

      function hideStatus() {
        statusMessage.classList.add('hidden');
      }

      // ----- Routing -----
      window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const selectedFile = urlParams.get('file');
        if (selectedFile && mdFiles.includes(selectedFile)) {
          renderFileMode(selectedFile);
        } else {
          renderHomeMode();
        }
      });

      function renderHomeMode() {
        homepageView.classList.remove('hidden');
        fileView.classList.add('hidden');
        fileList.innerHTML = '';
        mdFiles.forEach(file => {
          const li = document.createElement('li');
          li.className = "group bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl hover:border-indigo-200 transition-all duration-300";
          li.innerHTML = `
            <a href="?file=${encodeURIComponent(file)}" class="block">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <span class="text-2xl">📄</span>
                  <span class="font-semibold text-slate-800 group-hover:text-indigo-700 transition">${escapeHtml(file)}</span>
                </div>
                <span class="text-xs font-bold bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full group-hover:bg-indigo-100 transition">Open →</span>
              </div>
            </a>
          `;
          fileList.appendChild(li);
        });
      }

      function renderFileMode(fileName) {
        currentFileName = fileName;
        homepageView.classList.add('hidden');
        fileView.classList.remove('hidden');
        navFileName.textContent = fileName;
        navFileName.classList.remove('hidden');
        showStatus("Loading markdown file...");
        const filePath = dataFolder + fileName;
        fetch(filePath)
          .then(response => {
            if (!response.ok) throw new Error("File not found");
            return response.text();
          })
          .then(mdText => {
            fullMarkdownText = mdText;
            // render full markdown
            const html = markdownToHtml(mdText);
            mdContent.innerHTML = html;
            // update word count
            const words = mdText.split(/\s+/).filter(w => w.length > 0).length;
            wordCountBadge.textContent = `📄 ${words} words`;
            fileInfoIndicator.textContent = `${mdText.split('\n').length} lines • ${mdText.length} chars`;
            // reset search
            searchMatches = [];
            searchPointer = -1;
            currentSearchQuery = '';
            searchInput.value = '';
            searchControls.classList.add('hidden');
            hideStatus();
          })
          .catch((err) => {
            console.error(err);
            showStatus(`Failed to load "${fileName}".`, true);
          });
      }

      // ----- Search & highlight (plain text, across rendered HTML) -----
      function performSearch(query) {
        currentSearchQuery = query.trim().toLowerCase();
        searchMatches = [];
        searchPointer = -1;
        if (!currentSearchQuery) {
          // remove all highlights
          const content = mdContent;
          const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null, false);
          const nodes = [];
          let node;
          while (node = walker.nextNode()) nodes.push(node);
          // restore original text
          nodes.forEach(n => {
            if (n.parentElement && n.parentElement.classList.contains('mark-search')) {
              const parent = n.parentElement;
              parent.replaceWith(parent.textContent);
            }
          });
          searchControls.classList.add('hidden');
          return;
        }

        // First, remove old highlights
        const content = mdContent;
        const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null, false);
        const textNodes = [];
        let node;
        while (node = walker.nextNode()) textNodes.push(node);
        textNodes.forEach(n => {
          if (n.parentElement && n.parentElement.classList.contains('mark-search')) {
            const parent = n.parentElement;
            parent.replaceWith(parent.textContent);
          }
        });

        // Now re-scan text nodes and highlight matches
        const newWalker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null, false);
        const nodesToProcess = [];
        let n;
        while (n = newWalker.nextNode()) nodesToProcess.push(n);

        let matchCount = 0;
        nodesToProcess.forEach(textNode => {
          const text = textNode.textContent;
          const lower = text.toLowerCase();
          if (lower.includes(currentSearchQuery)) {
            // highlight
            const fragment = document.createDocumentFragment();
            let lastIdx = 0;
            let idx = lower.indexOf(currentSearchQuery);
            while (idx !== -1) {
              // before
              if (idx > lastIdx) {
                fragment.appendChild(document.createTextNode(text.slice(lastIdx, idx)));
              }
              // match
              const mark = document.createElement('span');
              mark.className = 'mark-search';
              mark.textContent = text.slice(idx, idx + currentSearchQuery.length);
              fragment.appendChild(mark);
              lastIdx = idx + currentSearchQuery.length;
              idx = lower.indexOf(currentSearchQuery, lastIdx);
              matchCount++;
            }
            if (lastIdx < text.length) {
              fragment.appendChild(document.createTextNode(text.slice(lastIdx)));
            }
            textNode.replaceWith(fragment);
          }
        });

        // collect match positions (for navigation we need to know which highlighted elements exist)
        const marks = mdContent.querySelectorAll('.mark-search');
        marks.forEach((el, i) => {
          searchMatches.push(i);
        });
        if (searchMatches.length) searchPointer = 0;
        updateSearchUI();
        if (searchPointer !== -1) scrollToMatch();
        // store current query for navigation
      }

      function goToMatch(offset) {
        if (!searchMatches.length) return;
        searchPointer = (searchPointer + offset + searchMatches.length) % searchMatches.length;
        updateSearchUI();
        scrollToMatch();
      }

      function scrollToMatch() {
        if (searchPointer < 0 || searchPointer >= searchMatches.length) return;
        const marks = mdContent.querySelectorAll('.mark-search');
        const target = marks[searchPointer];
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          // briefly highlight
          target.style.transition = 'background 0.2s';
          target.style.background = '#fcd34d';
          setTimeout(() => { target.style.background = ''; }, 600);
        }
      }

      function updateSearchUI() {
        if (!currentSearchQuery) {
          searchControls.classList.add('hidden');
          return;
        }
        searchControls.classList.remove('hidden');
        if (!searchMatches.length) {
          searchCount.textContent = '0/0';
          searchCount.className = "text-xs font-mono text-rose-500 px-2";
        } else {
          searchCount.textContent = `${searchPointer+1}/${searchMatches.length}`;
          searchCount.className = "text-xs font-mono text-slate-600 px-2";
        }
      }

      function clearSearch() {
        searchInput.value = '';
        performSearch('');
      }

      // ----- event listeners -----
      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => performSearch(e.target.value), 200);
      });
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (searchMatches.length) goToMatch(e.shiftKey ? -1 : 1);
        } else if (e.key === 'Escape') {
          clearSearch();
          searchInput.blur();
        }
      });
      searchPrevBtn.addEventListener('click', () => goToMatch(-1));
      searchNextBtn.addEventListener('click', () => goToMatch(1));
      searchClearBtn.addEventListener('click', () => { clearSearch(); searchInput.focus(); });

      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && !fileView.classList.contains('hidden')) {
          const tag = document.activeElement?.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA') return;
          e.preventDefault();
          searchInput.focus();
        }
      });

    })();
  </script>
</body>
</html>
