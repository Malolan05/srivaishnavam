<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Malolan • markdown tables</title>
  <!-- Fonts & icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #c7d2fe transparent; }
    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; border-radius: 8px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 8px; }
    .mark-search {
      background: #fde047;
      color: #1e293b;
      border-radius: 4px;
      padding: 0 2px;
      font-weight: 600;
      box-shadow: 0 0 0 2px rgba(253, 224, 71, 0.4);
    }
    .row-striped tbody tr:nth-child(even) { background-color: #f8fafc; }
    .glass-panel { backdrop-filter: blur(10px); background: rgba(255,255,255,0.8); }
    /* minimal markdown table style */
    .md-table-wrap { overflow-x: auto; }
    .md-table-wrap table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 0.9rem;
    }
    .md-table-wrap th {
      background: #f1f5f9;
      font-weight: 600;
      color: #1e293b;
      padding: 0.75rem 1rem;
      border-bottom: 2px solid #e2e8f0;
      text-align: left;
      white-space: nowrap;
      min-width: 80px;
    }
    .md-table-wrap td {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #e9edf2;
      color: #334155;
      max-width: 600px;
      word-wrap: break-word;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .md-table-wrap tr:last-child td { border-bottom: none; }
    .md-table-wrap tbody tr:hover { background: #f1f5fe; }
    
    /* Style for long text cells */
    .md-table-wrap td.long-text {
      min-width: 400px;
      max-width: 600px;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.6;
    }
    
    /* Style for normal cells */
    .md-table-wrap td.normal-text {
      white-space: nowrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50 text-slate-700 font-sans min-h-screen pb-16" style="font-family: 'Inter', system-ui, sans-serif;">

  <!-- Premium navigation -->
  <nav class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200/60 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-2 text-2xl font-bold bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent hover:scale-105 transition-transform">
        <span class="text-3xl">📜</span> Malolan
      </a>
      <div id="nav-file-name" class="hidden text-sm font-medium text-slate-500 bg-slate-100 px-4 py-1.5 rounded-full"></div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-10">
    <!-- Homepage: list .md files -->
    <div id="homepage-view" class="hidden">
      <div class="text-center mb-12">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 tracking-tight">Explore <span class="bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">Markdown tables</span></h1>
        <p class="mt-4 text-lg text-slate-500 max-w-2xl mx-auto">Select a .md file to view its table(s) with search & column controls.</p>
      </div>
      <ul id="file-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- dynamic file cards -->
      </ul>
    </div>

    <!-- Table view -->
    <div id="table-view" class="hidden">
      <!-- Toolbar -->
      <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
        <a href="index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-indigo-600 hover:text-indigo-800 bg-white px-4 py-2 rounded-full shadow-sm border border-indigo-100 hover:shadow-md transition">
          <span>←</span> Datasets
        </a>

        <div class="relative flex-1 min-w-[280px] max-w-lg">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" />
            </svg>
          </div>
          <input id="search-input" type="text" autocomplete="off" placeholder="Search rows… (press / to focus)"
            class="w-full pl-11 pr-28 py-3 text-sm bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition-all" />
          <div id="search-controls" class="hidden absolute inset-y-1 right-1 flex items-center gap-1 bg-white/90 rounded-xl px-1">
            <span id="search-count" class="text-xs font-mono text-slate-500 px-2 select-none whitespace-nowrap"></span>
            <button id="search-prev" type="button" title="Previous (Shift+Enter)" class="p-1.5 rounded-lg hover:bg-indigo-50 text-slate-500 hover:text-indigo-700 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M14.77 12.79a.75.75 0 01-1.06-.02L10 8.832l-3.71 3.938a.75.75 0 11-1.08-1.04l4.25-4.5a.75.75 0 011.08 0l4.25 4.5a.75.75 0 01-.02 1.06z" clip-rule="evenodd" /></svg>
            </button>
            <button id="search-next" type="button" title="Next (Enter)" class="p-1.5 rounded-lg hover:bg-indigo-50 text-slate-500 hover:text-indigo-700 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" /></svg>
            </button>
            <button id="search-clear" type="button" title="Clear (Esc)" class="p-1.5 rounded-lg hover:bg-red-50 text-slate-500 hover:text-red-600 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" clip-rule="evenodd" /></svg>
            </button>
          </div>
        </div>

        <!-- Column dropdown -->
        <div id="column-dropdown" class="relative shrink-0">
          <button id="column-dropdown-btn" type="button"
            class="inline-flex items-center gap-2 text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-2xl px-4 py-3 shadow-sm hover:shadow-md hover:border-indigo-300 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2.586a1 1 0 01-.293.707l-5.414 5.414a1 1 0 00-.293.707V17l-4-2v-3.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" clip-rule="evenodd" />
            </svg>
            <span id="column-count-label">Columns</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" /></svg>
          </button>
          <div id="column-dropdown-panel-wrapper"
            class="hidden absolute right-0 mt-3 w-72 sm:w-96 bg-white/95 backdrop-blur-md border border-slate-200 rounded-2xl shadow-xl z-20 p-4">
            <div class="flex items-center justify-between mb-3 pb-2 border-b border-slate-100">
              <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Toggle columns</span>
              <div class="flex gap-2 text-xs font-semibold">
                <button id="column-select-all" class="text-indigo-600 hover:text-indigo-800">All</button>
                <span class="text-slate-300">|</span>
                <button id="column-select-none" class="text-indigo-600 hover:text-indigo-800">None</button>
              </div>
            </div>
            <div id="column-dropdown-panel" class="grid grid-cols-2 gap-x-3 gap-y-1 max-h-60 overflow-y-auto custom-scroll"></div>
          </div>
        </div>
      </div>

      <!-- Table card -->
      <div class="bg-white/80 backdrop-blur-sm shadow-xl rounded-2xl overflow-hidden border border-slate-200/80">
        <div id="table-scroll-container" class="overflow-auto custom-scroll md-table-wrap" style="max-height: 70vh;">
          <table id="data-table" class="w-full text-left border-collapse row-striped">
            <!-- dynamic content -->
          </table>
        </div>
      </div>
      <div class="mt-3 text-xs text-right text-slate-400 pr-2" id="row-count-indicator"></div>
    </div>

    <!-- Status message -->
    <div id="status-message" class="text-center py-20 hidden">
      <div class="inline-flex flex-col items-center gap-4 bg-white p-8 rounded-3xl shadow-lg">
        <div class="animate-spin h-8 w-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full"></div>
        <p class="text-lg font-medium text-slate-600" id="status-text">Loading markdown tables...</p>
      </div>
    </div>
  </main>

  <script>
    (function() {
      // ----- CONFIGURATION -----
      // List of .md files (place in data/ folder)
      const mdFiles = [
        "brahma-sutra-adhyaya-one.md",
        "brahma-sutra-adhyaya-two.md",
        "brahma-sutra-adhyaya-three.md",
        "brahma-sutra-adhyaya-four.md"
      ];
      const dataFolder = "data/";

      // DOM elements
      const homepageView = document.getElementById('homepage-view');
      const tableView = document.getElementById('table-view');
      const fileList = document.getElementById('file-list');
      const dataTable = document.getElementById('data-table');
      const statusMessage = document.getElementById('status-message');
      const statusText = document.getElementById('status-text');
      const navFileName = document.getElementById('nav-file-name');
      const columnDropdown = document.getElementById('column-dropdown');
      const columnDropdownBtn = document.getElementById('column-dropdown-btn');
      const columnDropdownPanelWrapper = document.getElementById('column-dropdown-panel-wrapper');
      const columnDropdownPanel = document.getElementById('column-dropdown-panel');
      const columnCountLabel = document.getElementById('column-count-label');
      const columnSelectAllBtn = document.getElementById('column-select-all');
      const columnSelectNoneBtn = document.getElementById('column-select-none');
      const searchInput = document.getElementById('search-input');
      const searchControls = document.getElementById('search-controls');
      const searchCount = document.getElementById('search-count');
      const searchPrevBtn = document.getElementById('search-prev');
      const searchNextBtn = document.getElementById('search-next');
      const searchClearBtn = document.getElementById('search-clear');
      const rowCountIndicator = document.getElementById('row-count-indicator');

      // State
      let currentHeaders = [];
      let currentRows = [];
      let visibleColumns = [];
      let searchMatches = [];
      let searchPointer = -1;
      let currentSearchQuery = '';
      let searchDebounceTimer = null;

      const escapeHtml = (str) => {
        if (!str) return '';
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      };

      // ----- New function to wrap text at 100 characters with word breaks -----
      function wrapText(text, maxLength = 100) {
        if (!text) return '';
        if (text.length <= maxLength) return text;
        
        let result = '';
        let remaining = text;
        
        while (remaining.length > maxLength) {
          // Find the last space within the maxLength
          let cutAt = remaining.lastIndexOf(' ', maxLength);
          
          // If no space found, cut at maxLength
          if (cutAt === -1) {
            cutAt = maxLength;
          } else {
            // If cutAt is 0 (meaning the first character is space), find next space
            if (cutAt === 0) {
              const nextSpace = remaining.indexOf(' ', 1);
              cutAt = nextSpace !== -1 ? nextSpace : maxLength;
            }
          }
          
          // If cutAt is still 0 or invalid, force cut at maxLength
          if (cutAt <= 0 || cutAt > maxLength) {
            cutAt = maxLength;
          }
          
          result += remaining.substring(0, cutAt) + '\n';
          remaining = remaining.substring(cutAt).trimStart();
        }
        
        result += remaining;
        return result;
      }

      // ----- Modified highlight function to handle wrapped text -----
      function highlightCell(rawCell, query) {
        const cellStr = rawCell || '';
        if (!query) {
          // If no query, just wrap the text if needed
          return escapeHtml(wrapText(cellStr));
        }
        
        const lowerCell = cellStr.toLowerCase();
        const lowerQuery = query.toLowerCase();
        const idx = lowerCell.indexOf(lowerQuery);
        if (idx === -1) {
          return escapeHtml(wrapText(cellStr));
        }
        
        // Wrap the text first, then highlight
        const wrapped = wrapText(cellStr);
        // For simplicity, we'll just escape and then highlight the matched text
        const before = cellStr.slice(0, idx);
        const match = cellStr.slice(idx, idx + query.length);
        const after = cellStr.slice(idx + query.length);
        
        // Reconstruct with highlighting and wrapping
        const highlighted = escapeHtml(before) + `<mark class="mark-search">${escapeHtml(match)}</mark>` + escapeHtml(after);
        return escapeHtml(wrapText(highlighted));
      }

      function showStatus(msg, isError = false) {
        statusMessage.classList.remove('hidden');
        statusText.textContent = msg;
        statusText.className = isError ? "text-lg font-medium text-rose-600" : "text-lg font-medium text-slate-600";
      }

      function hideStatus() {
        statusMessage.classList.add('hidden');
      }

      // ----- Routing -----
      window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const selectedFile = urlParams.get('file');
        if (selectedFile && mdFiles.includes(selectedFile)) {
          renderTableMode(selectedFile);
        } else {
          renderHomeMode();
        }
      });

      function renderHomeMode() {
        homepageView.classList.remove('hidden');
        tableView.classList.add('hidden');
        fileList.innerHTML = '';
        mdFiles.forEach(file => {
          const li = document.createElement('li');
          li.className = "group bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl hover:border-indigo-200 transition-all duration-300";
          li.innerHTML = `
            <a href="?file=${encodeURIComponent(file)}" class="block">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                  <span class="text-2xl">📄</span>
                  <span class="font-semibold text-slate-800 group-hover:text-indigo-700 transition">${escapeHtml(file)}</span>
                </div>
                <span class="text-xs font-bold bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full group-hover:bg-indigo-100 transition">Explore →</span>
              </div>
            </a>
          `;
          fileList.appendChild(li);
        });
      }

      // ----- Markdown table parser (supports simple pipe tables) -----
      function parseMarkdownTable(mdText) {
        const lines = mdText.split('\n').filter(line => line.trim() !== '');
        let tables = [];
        let inTable = false;
        let currentHeader = null;
        let currentRows = [];

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          // detect if line starts and ends with '|' or contains '|' as separator
          const isTableLine = line.includes('|') && line.trim().startsWith('|') && line.trim().endsWith('|');
          if (!isTableLine) {
            if (inTable) {
              // push current table
              if (currentHeader && currentRows.length > 0) {
                tables.push({ header: currentHeader, rows: currentRows });
              }
              inTable = false;
              currentHeader = null;
              currentRows = [];
            }
            continue;
          }

          // parse cells: trim leading/trailing '|', split by '|'
          const cells = line.split('|').slice(1, -1).map(cell => cell.trim());

          // detect separator line (e.g., |---|---|)
          const isSeparator = cells.every(cell => /^[-:]+$/.test(cell));
          if (isSeparator) {
            // just skip separator
            continue;
          }

          if (!inTable) {
            // first data row is header
            currentHeader = cells;
            inTable = true;
          } else {
            // data row
            // ensure row length matches header (pad with empty if shorter)
            const row = cells.slice(0, currentHeader.length);
            while (row.length < currentHeader.length) row.push('');
            currentRows.push(row);
          }
        }

        // push last table if any
        if (inTable && currentHeader && currentRows.length > 0) {
          tables.push({ header: currentHeader, rows: currentRows });
        }

        return tables;
      }

      // ----- render table from parsed markdown table (only first table) -----
      function renderTableMode(fileName) {
        homepageView.classList.add('hidden');
        tableView.classList.remove('hidden');
        navFileName.textContent = fileName;
        navFileName.classList.remove('hidden');
        showStatus("Loading markdown file...");
        const filePath = dataFolder + fileName;
        fetch(filePath)
          .then(response => {
            if (!response.ok) throw new Error("File not found");
            return response.text();
          })
          .then(mdText => {
            const tables = parseMarkdownTable(mdText);
            if (tables.length === 0) {
              showStatus("No markdown table found in this file.", true);
              return;
            }
            // Use the first table
            const table = tables[0];
            currentHeaders = table.header;
            currentRows = table.rows;
            visibleColumns = currentHeaders.map(() => true);
            searchMatches = [];
            searchPointer = -1;
            currentSearchQuery = '';
            searchInput.value = '';
            searchControls.classList.add('hidden');
            columnDropdown.classList.remove('hidden');
            buildColumnDropdown();
            renderTable();
            updateRowCount();
            hideStatus();
          })
          .catch((err) => {
            console.error(err);
            showStatus(`Failed to load "${fileName}".`, true);
          });
      }

      function buildColumnDropdown() {
        columnDropdownPanel.innerHTML = '';
        currentHeaders.forEach((header, idx) => {
          const label = document.createElement('label');
          label.className = "flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-indigo-50 cursor-pointer transition text-sm";
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = true;
          checkbox.dataset.colIdx = idx;
          checkbox.className = "rounded border-slate-300 text-indigo-600 focus:ring-indigo-500";
          checkbox.addEventListener('change', (e) => {
            visibleColumns[idx] = e.target.checked;
            applyColumnVisibility(idx);
            updateColumnCountLabel();
          });
          const span = document.createElement('span');
          span.className = "text-slate-700 truncate";
          span.textContent = header || `Column ${idx+1}`;
          label.appendChild(checkbox);
          label.appendChild(span);
          columnDropdownPanel.appendChild(label);
        });
        updateColumnCountLabel();
      }

      function applyColumnVisibility(idx) {
        const isVisible = visibleColumns[idx];
        dataTable.querySelectorAll(`[data-col-idx="${idx}"]`).forEach(el => {
          el.classList.toggle('hidden', !isVisible);
        });
      }

      function updateColumnCountLabel() {
        const shown = visibleColumns.filter(Boolean).length;
        const total = visibleColumns.length;
        columnCountLabel.textContent = shown === total ? `Columns (${total})` : `${shown}/${total}`;
      }

      function updateRowCount() {
        if (rowCountIndicator) {
          rowCountIndicator.textContent = `${currentRows.length} row${currentRows.length !== 1 ? 's' : ''}`;
        }
      }

      // ----- Modified renderTable function with cell wrapping -----
      function renderTable(query = '') {
        let html = `<thead class="bg-slate-50/90 backdrop-blur-sm border-b border-slate-200"><tr>`;
        currentHeaders.forEach((header, idx) => {
          const hiddenClass = visibleColumns[idx] ? '' : 'hidden';
          html += `<th data-col-idx="${idx}" class="sticky top-0 bg-slate-50/95 backdrop-blur-sm px-6 py-3 text-xs font-bold uppercase tracking-wider text-slate-600 z-10 ${hiddenClass}">${escapeHtml(header)}</th>`;
        });
        html += `</tr></thead><tbody class="divide-y divide-slate-100">`;

        currentRows.forEach((row, rowIdx) => {
          const isMatch = query && searchMatches.includes(rowIdx);
          const isCurrent = isMatch && searchMatches[searchPointer] === rowIdx;
          let rowClass = 'transition-colors duration-150';
          if (isCurrent) rowClass = 'bg-indigo-50 ring-2 ring-inset ring-indigo-400';
          else if (isMatch) rowClass = 'bg-amber-50/70';

          html += `<tr data-row-idx="${rowIdx}" class="${rowClass}">`;
          row.forEach((cell, idx) => {
            const hiddenClass = visibleColumns[idx] ? '' : 'hidden';
            let cellContent;
            
            if (isMatch) {
              cellContent = highlightCell(cell, query);
            } else {
              // Wrap text if longer than 100 characters
              const wrappedText = wrapText(cell);
              cellContent = escapeHtml(wrappedText);
            }
            
            // Check if the original cell is longer than 100 characters
            const isLongText = (cell && cell.length > 100);
            const cellClass = isLongText ? 'long-text' : 'normal-text';
            
            html += `<td data-col-idx="${idx}" class="px-6 py-3 text-sm text-slate-600 ${cellClass} ${hiddenClass}">${cellContent}</td>`;
          });
          html += `</tr>`;
        });
        html += `</tbody>`;
        dataTable.innerHTML = html;
      }

      function performSearch(query) {
        currentSearchQuery = query.trim();
        searchMatches = [];
        searchPointer = -1;
        const q = currentSearchQuery.toLowerCase();
        if (q) {
          currentRows.forEach((row, idx) => {
            if (row.some(cell => (cell || '').toLowerCase().includes(q))) {
              searchMatches.push(idx);
            }
          });
          if (searchMatches.length) searchPointer = 0;
        }
        renderTable(currentSearchQuery);
        updateSearchUI();
        if (searchPointer !== -1) scrollToMatch();
      }

      function goToMatch(offset) {
        if (!searchMatches.length) return;
        searchPointer = (searchPointer + offset + searchMatches.length) % searchMatches.length;
        renderTable(currentSearchQuery);
        updateSearchUI();
        scrollToMatch();
      }

      function scrollToMatch() {
        if (searchPointer < 0 || searchPointer >= searchMatches.length) return;
        const rowEl = dataTable.querySelector(`tr[data-row-idx="${searchMatches[searchPointer]}"]`);
        if (rowEl) rowEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      function updateSearchUI() {
        if (!currentSearchQuery) {
          searchControls.classList.add('hidden');
          return;
        }
        searchControls.classList.remove('hidden');
        if (!searchMatches.length) {
          searchCount.textContent = '0/0';
          searchCount.className = "text-xs font-mono text-rose-500 px-2";
        } else {
          searchCount.textContent = `${searchPointer+1}/${searchMatches.length}`;
          searchCount.className = "text-xs font-mono text-slate-600 px-2";
        }
      }

      function clearSearch() {
        searchInput.value = '';
        performSearch('');
      }

      // ----- event listeners -----
      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => performSearch(e.target.value), 150);
      });
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (searchMatches.length) goToMatch(e.shiftKey ? -1 : 1);
        } else if (e.key === 'Escape') {
          clearSearch();
          searchInput.blur();
        }
      });
      searchPrevBtn.addEventListener('click', () => goToMatch(-1));
      searchNextBtn.addEventListener('click', () => goToMatch(1));
      searchClearBtn.addEventListener('click', () => { clearSearch(); searchInput.focus(); });

      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && !tableView.classList.contains('hidden')) {
          const tag = document.activeElement?.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA') return;
          e.preventDefault();
          searchInput.focus();
        }
      });

      columnDropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        columnDropdownPanelWrapper.classList.toggle('hidden');
      });
      document.addEventListener('click', (e) => {
        if (!columnDropdown.contains(e.target)) columnDropdownPanelWrapper.classList.add('hidden');
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') columnDropdownPanelWrapper.classList.add('hidden');
      });
      columnSelectAllBtn.addEventListener('click', () => {
        visibleColumns = visibleColumns.map(() => true);
        columnDropdownPanel.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
        currentHeaders.forEach((_, idx) => applyColumnVisibility(idx));
        updateColumnCountLabel();
      });
      columnSelectNoneBtn.addEventListener('click', () => {
        visibleColumns = visibleColumns.map(() => false);
        columnDropdownPanel.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        currentHeaders.forEach((_, idx) => applyColumnVisibility(idx));
        updateColumnCountLabel();
      });

    })();
  </script>
</body>
</html>
